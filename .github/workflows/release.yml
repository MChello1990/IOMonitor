name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.5.0)'
        required: true

env:
  BUILD_TYPE: Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

      - name: Build
        run: cmake --build build --config ${{env.BUILD_TYPE}}

      - name: Extract release notes
        id: changelog
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $changelog = Get-Content -Path CHANGELOG.md -Raw

          $entries = $changelog -split '## \['
          $notes = $null
          foreach ($entry in $entries) {
              if ($entry -match "^$tag\]") {
                  $notes = $entry -replace "^$tag\]\s*.*?(\r?\n|$)", ""
                  break
              }
          }

          if ($notes) {
              $notes.Trim() | Out-File -FilePath release-notes.md -Encoding utf8
              echo "has_notes=true" >> $env:GITHUB_OUTPUT
          } else {
              Write-Host "::warning::No changelog entry found for $tag"
              echo "has_notes=false" >> $env:GITHUB_OUTPUT
          }
          shell: pwsh
        
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: build/bin/Release/iomonitor.exe
          body: ${{ steps.changelog.outputs.notes && fromJSON(steps.changelog.outputs.notes) || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.notes == '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
